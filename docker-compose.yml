version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

  web:
    build:
      context: frontend
      dockerfile: ../infra/docker/Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
